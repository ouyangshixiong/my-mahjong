<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeiMi Mahjong AI Trainer</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>贝密麻将 AI 训练台</h1>
          <p id="roundStatus">初始化中</p>
        </div>
        <div class="toolbar">
          <label class="ruleset-control">
            <span>玩法</span>
            <select id="rulesetSelect"></select>
          </label>
          <button id="updateRulesButton" type="button">更新玩法</button>
          <button id="newRoundButton" type="button">新牌局</button>
          <button id="askAiButton" type="button">AI 建议</button>
          <button id="huButton" type="button">胡牌</button>
          <button id="pengButton" type="button">碰</button>
          <select id="gangSelect" class="gang-select" hidden></select>
          <button id="gangButton" type="button">杠</button>
          <button id="passButton" type="button">过</button>
        </div>
      </section>

      <section class="table">
        <div class="opponent opponent-top">
          <div class="seat-name">对家 <span id="player2LackSuit" class="lack-suit-badge"></span> <span id="player2Score" class="score-badge">0分</span></div>
          <div id="player2Hand" class="closed-hand"></div>
          <div id="player2Melds" class="melds"></div>
          <div id="player2River" class="river"></div>
        </div>

        <div class="opponent opponent-left">
          <div class="seat-name">上家 <span id="player1LackSuit" class="lack-suit-badge"></span> <span id="player1Score" class="score-badge">0分</span></div>
          <div id="player1Hand" class="closed-hand vertical"></div>
          <div id="player1Melds" class="melds"></div>
          <div id="player1River" class="river vertical-river"></div>
        </div>

        <div class="center-panel">
          <div id="exchangePanel" class="phase-panel" hidden>
            <strong>请选择换出的三张牌</strong>
            <span>从已定缺花色选择；缺门不足三张时，全选后可用其他牌补足。</span>
            <div id="exchangeSelectionStatus" class="phase-status">已选 0 / 3</div>
            <div class="phase-actions">
              <button id="confirmExchangeButton" type="button">确认换三张</button>
            </div>
          </div>
          <div id="lackSuitPanel" class="lack-suit-panel" hidden>
            <strong>请选择定缺</strong>
            <span>先确认缺门，再从该花色换出三张牌。</span>
            <div class="lack-suit-actions">
              <button type="button" data-lack-suit="m">缺万</button>
              <button type="button" data-lack-suit="p">缺筒</button>
              <button type="button" data-lack-suit="s">缺条</button>
            </div>
          </div>
          <div class="wall-card">
            <span id="wallCount">0</span>
            <small>墙牌</small>
          </div>
          <div id="messageLog" class="message-log"></div>
        </div>

        <div class="opponent opponent-right">
          <div class="seat-name">下家 <span id="player3LackSuit" class="lack-suit-badge"></span> <span id="player3Score" class="score-badge">0分</span></div>
          <div id="player3Hand" class="closed-hand vertical"></div>
          <div id="player3Melds" class="melds"></div>
          <div id="player3River" class="river vertical-river"></div>
        </div>

        <div class="self-area">
          <div class="self-rule-status">你的定缺：<span id="selfLackSuit">未定</span> · <span id="selfScore" class="score-badge">0分</span></div>
          <div id="selfRiver" class="river self-river"></div>
          <div id="selfMelds" class="melds self-melds"></div>
          <div id="selfHand" class="hand"></div>
        </div>
      </section>

      <aside class="advisor">
        <header>
          <strong>策略面板</strong>
          <span id="rulesetBadge">玩法未加载</span>
          <span id="serviceBadge">AI 服务连接中</span>
        </header>
        <div id="advisorContent" class="advisor-content"></div>
      </aside>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
