<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>麻将 AI 训练</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <section id="splashScreen" class="splash-screen" role="dialog" aria-modal="true" aria-label="开屏广告">
      <div class="splash-card">
        <div id="splashLoading" class="splash-loading">正在连接游戏服务</div>
        <a id="splashAdLink" class="splash-ad-link" rel="noopener noreferrer" hidden>
          <img id="splashAdImage" alt="">
        </a>
        <div id="splashCountdown" class="splash-countdown" hidden></div>
        <div id="splashError" class="splash-error" role="alert" hidden></div>
      </div>
    </section>
    <main id="shell" class="shell">
      <section id="gameTable" class="table">
        <div class="table-atmosphere" aria-hidden="true"></div>
        <header class="game-hud" aria-label="牌局状态">
          <div class="game-brand">
            <span class="brand-mark">雀</span>
            <span><strong>天府雀局</strong><small>MAHJONG ARENA</small></span>
          </div>
          <div class="hud-status">
            <span class="hud-chip"><i class="signal-icon"></i>离线</span>
            <span class="hud-chip">东风局</span>
            <span class="hud-chip hud-room">训练场 · 01</span>
          </div>
          <div class="hud-actions menu-command-controls">
            <span id="roundStatus" class="visually-hidden">初始化中</span>
            <select id="rulesetSelect" aria-label="开局玩法"></select>
            <button id="updateRulesButton" type="button">玩法</button>
            <button id="newRoundButton" type="button">新局</button>
            <button id="askAiButton" type="button">建议</button>
            <button id="toggleAdvisorButton" type="button" aria-pressed="false">策略</button>
          </div>
        </header>

        <div class="opponent opponent-top">
          <button class="player-card score-history-trigger" type="button" data-player-index="2" aria-haspopup="dialog" aria-controls="scoreHistoryModal">
            <span id="player2LackSuit" class="seat-avatar avatar-top"></span>
            <span class="seat-copy"><b>对家 · 玄武</b><small><span id="player2WinCount" class="win-count-badge"></span> <span id="player2Score" class="score-badge">0分</span></small></span>
          </button>
          <div id="player2Hand" class="closed-hand"></div>
          <div id="player2WonTiles" class="won-tiles won-tiles-top" role="list" aria-label="对家胡牌张"></div>
          <div id="player2Melds" class="melds"></div>
        </div>

        <div class="opponent opponent-left">
          <button class="player-card score-history-trigger" type="button" data-player-index="1" aria-haspopup="dialog" aria-controls="scoreHistoryModal">
            <span id="player1LackSuit" class="seat-avatar avatar-left"></span>
            <span class="seat-copy"><b>上家 · 白虎</b><small><span id="player1WinCount" class="win-count-badge"></span> <span id="player1Score" class="score-badge">0分</span></small></span>
          </button>
          <div id="player1Hand" class="closed-hand vertical"></div>
          <div id="player1WonTiles" class="won-tiles won-tiles-left won-tiles-vertical" role="list" aria-label="上家胡牌张"></div>
          <div id="player1Melds" class="melds"></div>
        </div>

        <div class="center-panel">
          <div id="exchangePanel" class="phase-panel" hidden>
            <strong>请选择换出的三张牌</strong>
            <span>从已定缺花色选择；缺门不足三张时，全选后可用其他牌补足。</span>
            <div id="exchangeSelectionStatus" class="phase-status">已选 0 / 3</div>
            <div class="phase-actions">
              <button id="confirmExchangeButton" type="button">确认换三张</button>
            </div>
          </div>
          <div id="lackSuitPanel" class="lack-suit-panel" hidden>
            <strong>请选择定缺</strong>
            <span>先确认缺门，再从该花色换出三张牌。</span>
            <div class="lack-suit-actions">
              <button type="button" data-lack-suit="m">缺万</button>
              <button type="button" data-lack-suit="p">缺筒</button>
              <button type="button" data-lack-suit="s">缺条</button>
            </div>
          </div>
          <div class="round-console">
            <div class="wind-ring" aria-hidden="true">
              <span class="wind wind-top">北</span>
              <span class="wind wind-right">东</span>
              <span class="wind wind-bottom">南</span>
              <span class="wind wind-left">西</span>
            </div>
            <div id="turnIndicator" class="turn-indicator" hidden role="status" aria-live="polite" aria-atomic="true">
              <span class="turn-indicator-arm" aria-hidden="true">
                <span class="turn-indicator-arrow"></span>
              </span>
              <span id="turnIndicatorLabel" class="visually-hidden"></span>
            </div>
            <div class="wall-card">
              <small>剩余</small>
              <span id="wallCount">0</span>
              <small>张牌</small>
            </div>
          </div>
          <div id="messageLog" class="message-log" hidden aria-hidden="true"></div>
        </div>

        <div class="discard-field" aria-label="四家已出牌区域">
          <div id="player2River" class="river river-top" aria-label="对家已出牌"></div>
          <div id="player1River" class="river river-left" aria-label="上家已出牌"></div>
          <div id="player3River" class="river river-right" aria-label="下家已出牌"></div>
          <div id="selfRiver" class="river river-self" aria-label="你已出的牌"></div>
        </div>

        <div id="exchangeAnimation" class="exchange-animation" hidden aria-live="polite" aria-atomic="true">
          <div id="exchangeFlightLayer" class="exchange-flight-layer" aria-hidden="true"></div>
          <div id="exchangeAnnouncement" class="exchange-announcement">
            <svg class="exchange-direction-arrows" viewBox="0 0 420 170" aria-hidden="true">
              <defs>
                <filter id="exchangeArrowGlow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
                  <feMerge>
                    <feMergeNode in="blur"></feMergeNode>
                    <feMergeNode in="SourceGraphic"></feMergeNode>
                  </feMerge>
                </filter>
                <marker id="exchangeArrowHead" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
                  <path d="M0,0 L9,4.5 L0,9 Z"></path>
                </marker>
              </defs>
              <g class="exchange-arrow-set exchange-arrows-clockwise">
                <path d="M74 68 C96 30 137 18 177 29"></path>
                <path d="M346 102 C324 140 283 152 243 141"></path>
              </g>
              <g class="exchange-arrow-set exchange-arrows-counterclockwise">
                <path d="M177 29 C137 18 96 30 74 68"></path>
                <path d="M243 141 C283 152 324 140 346 102"></path>
              </g>
              <g class="exchange-arrow-set exchange-arrows-across">
                <path d="M72 54 C142 18 278 18 348 54"></path>
                <path d="M348 116 C278 152 142 152 72 116"></path>
              </g>
            </svg>
            <div class="exchange-announcement-card">
              <strong>换牌中<span class="exchange-ellipsis">...</span></strong>
              <span id="exchangeDirectionMessage">本局顺时针换牌</span>
            </div>
          </div>
        </div>

        <div class="wall-segment wall-segment-top" aria-label="对家前方牌墙">
          <span class="wall-seat-label">对家牌墙</span>
          <div id="player2Wall" class="wall-tiles wall-tiles-horizontal"></div>
        </div>
        <div class="wall-segment wall-segment-left" aria-label="上家前方牌墙">
          <span class="wall-seat-label">上家牌墙</span>
          <div id="player1Wall" class="wall-tiles wall-tiles-vertical"></div>
        </div>
        <div class="wall-segment wall-segment-right" aria-label="下家前方牌墙">
          <span class="wall-seat-label">下家牌墙</span>
          <div id="player3Wall" class="wall-tiles wall-tiles-vertical"></div>
        </div>
        <div class="wall-segment wall-segment-bottom" aria-label="你前方牌墙">
          <span class="wall-seat-label">你的牌墙</span>
          <div id="player0Wall" class="wall-tiles wall-tiles-horizontal"></div>
        </div>

        <div id="actionPanel" class="action-panel" hidden>
          <select id="gangSelect" class="gang-select" hidden></select>
          <div class="action-buttons">
            <button id="huButton" class="table-action action-gold" type="button">胡</button>
            <button id="pengButton" class="table-action action-jade" type="button">碰</button>
            <button id="gangButton" class="table-action action-gold" type="button">杠</button>
            <button id="passButton" class="table-action action-jade" type="button">过</button>
          </div>
        </div>

        <div class="opponent opponent-right">
          <button class="player-card score-history-trigger" type="button" data-player-index="3" aria-haspopup="dialog" aria-controls="scoreHistoryModal">
            <span id="player3LackSuit" class="seat-avatar avatar-right"></span>
            <span class="seat-copy"><b>下家 · 朱雀</b><small><span id="player3WinCount" class="win-count-badge"></span> <span id="player3Score" class="score-badge">0分</span></small></span>
          </button>
          <div id="player3Hand" class="closed-hand vertical"></div>
          <div id="player3WonTiles" class="won-tiles won-tiles-right won-tiles-vertical" role="list" aria-label="下家胡牌张"></div>
          <div id="player3Melds" class="melds"></div>
        </div>

        <div class="self-area">
          <button class="self-player-card score-history-trigger" type="button" data-player-index="0" aria-haspopup="dialog" aria-controls="scoreHistoryModal">
            <span id="selfLackSuit" class="seat-avatar avatar-self"></span>
            <span class="seat-copy"><b>你 · 青龙</b><small><span id="selfWinCount" class="win-count-badge"></span> <span id="selfScore" class="score-badge">0分</span></small></span>
          </button>
          <div id="selfWonTiles" class="won-tiles won-tiles-self" role="list" aria-label="你的胡牌张"></div>
          <div id="selfMelds" class="melds self-melds"></div>
          <div id="selfHand" class="hand"></div>
        </div>

        <div id="scoreHistoryModal" class="score-history-modal" hidden>
          <button id="scoreHistoryBackdrop" class="score-history-backdrop" type="button" aria-label="关闭分数明细"></button>
          <section id="scoreHistoryDialog" class="score-history-dialog" role="dialog" aria-modal="true" aria-labelledby="scoreHistoryTitle">
            <header class="score-history-header">
              <div>
                <small>本局计分明细</small>
                <h2 id="scoreHistoryTitle"></h2>
              </div>
              <button id="scoreHistoryCloseButton" class="score-history-close" type="button" aria-label="关闭分数明细">×</button>
            </header>
            <div id="scoreHistorySummary" class="score-history-summary"></div>
            <div id="scoreHistoryList" class="score-history-list"></div>
          </section>
        </div>
      </section>

      <aside id="advisor" class="advisor" hidden>
        <header>
          <strong>策略面板</strong>
          <span id="rulesetBadge">玩法未加载</span>
          <span id="serviceBadge">AI 服务连接中</span>
        </header>
        <div id="advisorContent" class="advisor-content"></div>
      </aside>
    </main>

    <script src="./android-bridge.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
