# Include this file inside the HTTPS server block for watermark.mmgss.com.

location = /mahjong {
    return 308 /mahjong/;
}

location = /mahjong/ {
    root /opt/mahjong-android-ai/dist;
    try_files /index.html =404;
    types { }
    default_type text/html;
    add_header Cache-Control "no-cache" always;
    add_header X-Content-Type-Options "nosniff" always;
}

location = /mahjong/mahjong-ai-1.0.0.apk {
    alias /opt/mahjong-android-ai/dist/mahjong-ai-1.0.0.apk;
    types { }
    default_type application/vnd.android.package-archive;
    add_header Content-Disposition 'attachment; filename="mahjong-ai-1.0.0.apk"' always;
    add_header Cache-Control "public, max-age=3600" always;
    add_header X-Content-Type-Options "nosniff" always;
}

location ^~ /mahjong/api/ {
    proxy_pass http://127.0.0.1:5057/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /mahjong;
    proxy_set_header Connection "";
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_buffering off;
}

location ^~ /mahjong/assets/ {
    proxy_pass http://127.0.0.1:5057/assets/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /mahjong;
    proxy_set_header Connection "";
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_buffering off;
}

location /mahjong/ {
    return 404;
}
