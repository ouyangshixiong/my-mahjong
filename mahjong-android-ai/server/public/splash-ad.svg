<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title description">
  <title id="title">开发者推荐</title>
  <desc id="description">可替换的开屏广告示例图</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#113f36"/>
      <stop offset="1" stop-color="#08231f"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#background)"/>
  <rect x="80" y="80" width="1120" height="560" rx="36" fill="#f4e5b8"/>
  <text x="640" y="305" text-anchor="middle" fill="#173c34" font-family="sans-serif" font-size="76" font-weight="700">广告位</text>
  <text x="640" y="400" text-anchor="middle" fill="#45675f" font-family="sans-serif" font-size="34">替换 server/public/splash-ad.svg 和广告配置即可上线</text>
  <text x="640" y="565" text-anchor="middle" fill="#6f806f" font-family="sans-serif" font-size="24">开发者推荐</text>
